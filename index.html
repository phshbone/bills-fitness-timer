    :root {
      --bg:#090b0e; --panel:#171b21; --panel2:#20262e; --edge:#4b5561;
      --text:#f4f7fa; --muted:#9aa4ae; --green:#7f9982; --green-light:#aebcaf; --green-dark:#586f5b;
      --silver:#c7ced3; --amber:#b8955d; --red:#a85f62; --rest:#71858b; --shadow:rgba(0,0,0,.55);
      --progress:0deg; --accent:var(--green);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; min-height:100%; background:var(--bg); color:var(--text); }
    body {
      min-height:100svh; overflow-x:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      padding:calc(14px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 50% -10%, rgba(127,153,130,.16), transparent 38%),
        repeating-linear-gradient(135deg, rgba(255,255,255,.018) 0 1px, transparent 1px 6px),
        linear-gradient(180deg,#11151a,#080a0c 75%);
    }
    body::before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.28;
      background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
      background-size:22px 22px; }
    button,input { font:inherit; }
    button { touch-action:manipulation; }
    .app { width:min(100%,520px); margin:auto; }
    .brand { display:flex; align-items:flex-end; justify-content:space-between; margin:0 4px 12px; }
    .logo { font-family:Bauhaus,"Arial Black",sans-serif; font-size:clamp(30px,8vw,43px); line-height:.9; letter-spacing:-1px; text-transform:lowercase; }
    .logo span { color:var(--green-light); text-shadow:0 2px 0 rgba(0,0,0,.65),1px 0 0 rgba(255,255,255,.14),0 0 14px rgba(199,206,211,.18); }
    .tag { color:var(--muted); font-size:11px; letter-spacing:2px; text-transform:uppercase; padding-bottom:3px; }
    .mode-tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:6px; border:1px solid #343c46; border-radius:16px; background:#0e1115; box-shadow:inset 0 0 0 1px #050607,0 8px 24px var(--shadow); }
    .mode-tab { border:0; border-radius:11px; padding:11px; color:#8e99a5; background:transparent; font-weight:800; letter-spacing:.7px; }
    .mode-tab.active { color:#101511; border:1px solid #9eaaa0; background:linear-gradient(180deg,#aebcaf,#748d77); box-shadow:0 2px 0 #313a33,0 0 0 1px rgba(199,206,211,.24),0 0 16px rgba(199,206,211,.12),inset 0 1px rgba(255,255,255,.35); }
    .stage { position:relative; margin:14px 0; padding:18px; border-radius:28px; border:1px solid #45505b;
      background:linear-gradient(145deg,#262d35,#11151a 55%,#0d1014); box-shadow:inset 0 1px rgba(255,255,255,.08),inset 0 -20px 45px rgba(0,0,0,.28),0 18px 42px var(--shadow); overflow:hidden; }
    .stage::before { content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(115deg,rgba(255,255,255,.09),transparent 24% 76%,rgba(255,255,255,.025)); }
    .phase { position:relative; z-index:2; text-align:center; color:var(--accent); font-size:13px; font-weight:900; letter-spacing:3px; text-transform:uppercase; min-height:18px; }
    .dial { --size:min(72vw,330px); width:var(--size); aspect-ratio:1; margin:7px auto 4px; border-radius:50%; padding:12px;
      background:conic-gradient(var(--accent) var(--progress),#303842 0); box-shadow:0 0 0 2px rgba(199,206,211,.24),0 5px 0 rgba(70,78,74,.78),0 0 20px rgba(199,206,211,.10),inset 0 0 18px #000; transition:background .18s linear; }
    .dial-inner { width:100%; height:100%; border-radius:50%; display:grid; place-items:center; position:relative;
      background:radial-gradient(circle at 50% 35%,#242b33,#0b0e12 72%); border:2px solid #0a0c0f; box-shadow:inset 0 0 42px #000,0 0 0 2px #515b66; }
    .time { font-family:Bauhaus,"Arial Black",sans-serif; font-variant-numeric:tabular-nums; font-size:clamp(64px,19vw,104px); letter-spacing:-4px; line-height:.9; color:#f3f5f3; text-shadow:0 5px 18px #000,2px 2px 0 rgba(70,80,73,.95),-1px -1px 0 rgba(199,206,211,.32),0 0 13px rgba(199,206,211,.10); }
    .status { margin-top:8px; color:var(--muted); font-size:12px; letter-spacing:2px; text-transform:uppercase; text-align:center; }
    .round-strip { display:none; position:relative; z-index:2; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; margin-top:6px; color:#bdc6ce; font-size:13px; }
    .round-strip.show { display:grid; }
    .round-strip .line { height:1px; background:linear-gradient(90deg,transparent,#505a65); }
    .round-strip .line:last-child { transform:scaleX(-1); }
    .panel { margin-bottom:12px; padding:14px; border:1px solid #343d47; border-radius:18px; background:linear-gradient(145deg,rgba(35,41,49,.94),rgba(15,18,23,.96)); box-shadow:inset 0 1px rgba(255,255,255,.05),0 10px 24px rgba(0,0,0,.3); }
    .panel-title { margin:0 0 10px; color:#aab4bd; font-size:11px; font-weight:900; letter-spacing:2px; text-transform:uppercase; }
    .preset-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .steel-btn { position:relative; border:1px solid #4b5661; border-radius:12px; min-height:48px; color:#e7edf2; font-weight:800; background:linear-gradient(180deg,#303843,#191e24); box-shadow:inset 0 1px rgba(255,255,255,.12),inset 0 -5px 10px rgba(0,0,0,.2),0 4px 9px rgba(0,0,0,.32); }
    .steel-btn:active { transform:translateY(1px); filter:brightness(1.12); }
    .steel-btn.selected { color:#101511; border-color:#9eaaa0; background:linear-gradient(180deg,#aebcaf,#718a74); box-shadow:0 2px 0 #313a33,0 0 0 1px rgba(199,206,211,.22),0 0 14px rgba(199,206,211,.10),inset 0 1px rgba(255,255,255,.34); }
    .adjust-row { display:grid; grid-template-columns:1fr 1.5fr 1fr; gap:8px; margin-top:9px; }
    .adjust-row .steel-btn { font-size:18px; }
    .custom-row { display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:9px; }
    .custom-input { min-width:0; border:1px solid #47525e; border-radius:12px; padding:0 13px; color:#fff; background:#0d1014; box-shadow:inset 0 3px 9px #000; }
    .interval-panel { display:none; }
    .interval-panel.show { display:block; }
    .settings-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .setting { text-align:center; padding:10px 6px; border:1px solid #3b4650; border-radius:13px; background:#101419; }
    .setting label { display:block; color:#929da7; font-size:10px; font-weight:900; letter-spacing:1.3px; text-transform:uppercase; }
    .stepper { display:grid; grid-template-columns:32px 1fr 32px; align-items:center; gap:2px; margin-top:7px; }
    .stepper button { height:32px; border:1px solid #45515c; border-radius:9px; color:#dfe6eb; background:#242b33; font-size:18px; font-weight:900; }
    .stepper output { font-family:Bauhaus,"Arial Black",sans-serif; font-size:24px; }
    .main-controls { display:grid; grid-template-columns:1fr 1.7fr 1fr; gap:9px; margin-top:12px; }
    .main-btn { border-radius:15px; min-height:58px; border:1px solid #4d5964; color:#cbd3da; font-weight:900; letter-spacing:.5px; background:linear-gradient(180deg,#303943,#171c22); box-shadow:inset 0 1px rgba(255,255,255,.12),0 8px 16px rgba(0,0,0,.35); }
    .main-btn.primary { color:#101511; border-color:#9eaaa0; background:linear-gradient(180deg,#afbdaf,#708973); font-size:18px; box-shadow:0 3px 0 #303a32,0 0 0 1px rgba(199,206,211,.24),0 0 16px rgba(199,206,211,.10),inset 0 1px rgba(255,255,255,.38),0 8px 16px rgba(0,0,0,.4); }
    .main-btn:active { transform:translateY(1px); }
    .main-btn:disabled { opacity:.35; }
    .options { display:flex; justify-content:center; gap:18px; margin-top:13px; color:#a5afb8; font-size:12px; }
    .toggle { display:flex; align-items:center; gap:7px; }
    .toggle input { width:18px; height:18px; accent-color:var(--green); }
    .finished .stage { animation:finishFlash .7s ease-in-out 4; }
    .warning { --accent:var(--amber); }
    .resting { --accent:var(--rest); }
    .finished { --accent:var(--red); }
    @keyframes finishFlash { 50% { filter:brightness(1.28); box-shadow:0 0 0 2px rgba(199,206,211,.18),0 0 38px rgba(168,95,98,.28); } }
    /* Compact phone layout: keeps the entire quick timer visible without crowding it. */
    @media (max-width:430px) and (max-height:950px) {
      body { padding-top:calc(10px + env(safe-area-inset-top)); padding-left:14px; padding-right:14px; }
      .brand { margin-bottom:9px; }
      .logo { font-size:clamp(29px,8vw,38px); }
      .mode-tabs { gap:6px; padding:5px; border-radius:15px; }
      .mode-tab { padding:9px 7px; }
      .stage { margin:10px 0; padding:12px 14px 11px; border-radius:23px; }
      .phase { font-size:12px; min-height:16px; letter-spacing:2.6px; }
      .dial { --size:min(63vw,270px); margin:5px auto 2px; padding:10px; }
      .time { font-size:clamp(58px,17vw,82px); }
      .status { margin-top:6px; }
      .panel { margin-bottom:9px; padding:11px 13px; border-radius:16px; }
      .panel-title { margin-bottom:8px; }
      .preset-grid { gap:7px; }
      .steel-btn { min-height:44px; }
      .adjust-row, .custom-row { margin-top:7px; gap:7px; }
      .custom-input { min-height:44px; }
      .main-controls { margin-top:9px; gap:8px; }
      .main-btn { min-height:54px; }
      .options { margin-top:10px; }
    }
    @media (max-height:740px) {
      .brand { display:none; }
      .dial { --size:min(55vw,230px); }
      .stage { padding:10px 12px; }
      .panel { padding:10px 12px; }
      .steel-btn { min-height:41px; }
      .main-btn { min-height:49px; }
    }
    @media (prefers-reduced-motion:reduce) { * { animation:none!important; transition:none!important; } }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="brand"><div class="logo">bill's <span>time</span></div><div class="tag">fitness timer</div></header>
    <nav class="mode-tabs" aria-label="Timer mode">
      <button class="mode-tab active" data-mode="quick">Quick Timer</button>
      <button class="mode-tab" data-mode="interval">Intervals</button>
    </nav>

    <section class="stage" aria-live="polite">
      <div class="phase" id="phaseLabel">QUICK TIMER</div>
      <div class="dial" id="dial"><div class="dial-inner"><div><div class="time" id="timerDisplay">0:40</div><div class="status" id="timerStatus">ready</div></div></div></div>
      <div class="round-strip" id="roundStrip"><span class="line"></span><strong id="roundLabel">ROUND 1 OF 5</strong><span class="line"></span></div>
    </section>

    <section class="panel quick-panel" id="quickPanel">
      <h2 class="panel-title">Quick Select</h2>
      <div class="preset-grid">
        <button class="steel-btn" data-seconds="30">30 sec</button><button class="steel-btn" data-seconds="35">35 sec</button><button class="steel-btn selected" data-seconds="40">40 sec</button>
        <button class="steel-btn" data-seconds="45">45 sec</button><button class="steel-btn" data-seconds="60">1:00</button><button class="steel-btn" data-seconds="90">1:30</button>
      </div>
      <div class="adjust-row"><button class="steel-btn" id="minusBtn">−5</button><button class="steel-btn" id="restartBtn">Restart Time</button><button class="steel-btn" id="plusBtn">+5</button></div>
      <div class="custom-row"><input class="custom-input" id="customInput" type="number" inputmode="numeric" min="1" max="3600" placeholder="Custom seconds"><button class="steel-btn" id="customSetBtn">Set</button></div>
    </section>

    <section class="panel interval-panel" id="intervalPanel">
      <h2 class="panel-title">Interval Setup</h2>
      <div class="settings-grid">
        <div class="setting"><label>Work</label><div class="stepper"><button data-step="work" data-delta="-5">−</button><output id="workValue">40</output><button data-step="work" data-delta="5">+</button></div></div>
        <div class="setting"><label>Rest</label><div class="stepper"><button data-step="rest" data-delta="-5">−</button><output id="restValue">20</output><button data-step="rest" data-delta="5">+</button></div></div>
        <div class="setting"><label>Rounds</label><div class="stepper"><button data-step="rounds" data-delta="-1">−</button><output id="roundsValue">5</output><button data-step="rounds" data-delta="1">+</button></div></div>
      </div>
    </section>

    <div class="main-controls">
      <button class="main-btn" id="resetBtn">Reset</button><button class="main-btn primary" id="startBtn">Start</button><button class="main-btn" id="skipBtn">Skip</button>
    </div>
    <div class="options"><label class="toggle"><input id="soundToggle" type="checkbox" checked> Sound</label><label class="toggle"><input id="voiceToggle" type="checkbox"> Voice cues</label></div>
  </main>

<script>
(() => {
  const $ = s => document.querySelector(s), $$ = s => [...document.querySelectorAll(s)];
  const app=$('#app'), display=$('#timerDisplay'), status=$('#timerStatus'), phaseLabel=$('#phaseLabel'), dial=$('#dial');
  const startBtn=$('#startBtn'), resetBtn=$('#resetBtn'), skipBtn=$('#skipBtn'), roundStrip=$('#roundStrip'), roundLabel=$('#roundLabel');
  const quickPanel=$('#quickPanel'), intervalPanel=$('#intervalPanel');
  const values={work:40,rest:20,rounds:5};
  let mode='quick', selectedSeconds=40, remainingMs=40000, durationMs=40000, targetTime=0, ticker=null;
  let state='ready', phase='work', currentRound=1, audioCtx=null, wakeLock=null, lastShown=null;

  const format = ms => { const s=Math.max(0,Math.ceil(ms/1000)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };
  function unlockAudio(){ try { audioCtx ||= new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); } catch(e){} }
  function tone(freq=700,duration=.12,volume=.18,delay=0){ if(!$('#soundToggle').checked||!audioCtx)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime+delay; o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(volume,t);g.gain.exponentialRampToValueAtTime(.001,t+duration);o.start(t);o.stop(t+duration); }
  function speak(text){ if($('#voiceToggle').checked&&'speechSynthesis'in window){ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);u.rate=1.05;u.volume=.9;speechSynthesis.speak(u); } }
  async function requestWake(){ try { if('wakeLock'in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
  function releaseWake(){ try{wakeLock?.release();}catch(e){} wakeLock=null; }

  function setVisualClass(){ app.classList.toggle('warning',state==='running'&&remainingMs<=10000);app.classList.toggle('resting',mode==='interval'&&phase==='rest'&&state!=='finished');app.classList.toggle('finished',state==='finished'); }
  function render(){
    display.textContent=format(remainingMs);
    const pct=durationMs?Math.max(0,Math.min(1,1-remainingMs/durationMs)):0;
    document.documentElement.style.setProperty('--progress',`${pct*360}deg`);
    status.textContent=state==='running'?'running':state==='paused'?'paused':state==='finished'?'complete':'ready';
    phaseLabel.textContent=mode==='quick'?'QUICK TIMER':state==='finished'?'WORKOUT COMPLETE':phase.toUpperCase();
    roundLabel.textContent=`ROUND ${currentRound} OF ${values.rounds}`;
    startBtn.textContent=state==='running'?'Pause':state==='paused'?'Resume':state==='finished'?'Again':'Start';
    skipBtn.disabled=mode==='quick'||state==='ready'||state==='finished';
    setVisualClass();
  }
  function setQuick(seconds){ stopTicker(); selectedSeconds=Math.max(5,Math.min(3600,seconds));remainingMs=durationMs=selectedSeconds*1000;state='ready'; $$('.preset-grid .steel-btn').forEach(b=>b.classList.toggle('selected',+b.dataset.seconds===selectedSeconds));render(); }
  function setPhase(next, announce=true){ phase=next; durationMs=remainingMs=(phase==='work'?values.work:values.rest)*1000; lastShown=null; if(announce){ tone(phase==='work'?880:520,.18,.2);speak(phase==='work'?`Work. Round ${currentRound}`:'Rest'); } render(); }
  function tick(){ remainingMs=Math.max(0,targetTime-Date.now()); const shown=Math.ceil(remainingMs/1000); if(shown!==lastShown){ lastShown=shown; if(shown>0&&shown<=3) tone(560+shown*80,.09,.13); } render(); if(remainingMs<=0) completePhase(); }
  function startTicker(){ clearInterval(ticker);targetTime=Date.now()+remainingMs;ticker=setInterval(tick,100);tick();requestWake(); }
  function stopTicker(){ clearInterval(ticker);ticker=null;releaseWake(); }
  function start(){ unlockAudio();app.classList.remove('finished'); if(state==='finished'){ reset(); } if(remainingMs<=0) reset();state='running';startTicker();render(); }
  function pause(){ remainingMs=Math.max(0,targetTime-Date.now());stopTicker();state='paused';render(); }
  function completePhase(){ stopTicker(); if(mode==='quick'){ finish();return; } if(phase==='work'&&values.rest>0){ setPhase('rest');state='running';startTicker();return; } if(phase==='rest'||values.rest===0){ if(currentRound<values.rounds){currentRound++;setPhase('work');state='running';startTicker();}else finish(); } }
  function finish(){ remainingMs=0;state='finished';tone(880,.25,.24,0);tone(1100,.25,.22,.24);tone(1320,.45,.22,.48);speak('Workout complete');if(navigator.vibrate)navigator.vibrate([150,80,150,80,300]);render();setTimeout(()=>app.classList.remove('finished'),3000); }
  function reset(){ stopTicker();state='ready';currentRound=1;phase='work'; if(mode==='quick'){remainingMs=durationMs=selectedSeconds*1000;}else{remainingMs=durationMs=values.work*1000;} lastShown=null;render(); }
  function skip(){ if(mode==='interval'&&state!=='ready'&&state!=='finished'){remainingMs=0;completePhase();} }

  startBtn.onclick=()=>state==='running'?pause():start(); resetBtn.onclick=reset; skipBtn.onclick=skip;
  $$('.mode-tab').forEach(b=>b.onclick=()=>{ mode=b.dataset.mode; $$('.mode-tab').forEach(x=>x.classList.toggle('active',x===b));quickPanel.style.display=mode==='quick'?'block':'none';intervalPanel.classList.toggle('show',mode==='interval');roundStrip.classList.toggle('show',mode==='interval');reset(); });
  $$('.preset-grid .steel-btn').forEach(b=>b.onclick=()=>setQuick(+b.dataset.seconds));
  $('#plusBtn').onclick=()=>{selectedSeconds=Math.min(3600,Math.ceil(remainingMs/1000)+5);remainingMs+=5000;durationMs=Math.max(durationMs,remainingMs);render();};
  $('#minusBtn').onclick=()=>{remainingMs=Math.max(5000,remainingMs-5000);selectedSeconds=Math.ceil(remainingMs/1000);durationMs=Math.max(remainingMs,selectedSeconds*1000);render();};
  $('#restartBtn').onclick=()=>setQuick(selectedSeconds);
  function customSet(){const n=+$('#customInput').value;if(n>=1&&n<=3600){setQuick(n);$('#customInput').value='';}}
  $('#customSetBtn').onclick=customSet;$('#customInput').addEventListener('keydown',e=>{if(e.key==='Enter')customSet();});
  $$('[data-step]').forEach(b=>b.onclick=()=>{const k=b.dataset.step,d=+b.dataset.delta;values[k]=Math.max(k==='rounds'?1:k==='rest'?0:5,Math.min(k==='rounds'?50:3600,values[k]+d));$(`#${k}Value`).textContent=values[k];if(state==='ready')reset();});
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&state==='running'){tick();requestWake();}});
  render();
})();
</script>
</body>
</html>
